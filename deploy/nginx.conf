server {
    listen 80;
    server_name nothingcouldbebetter.com;

    # React SPA build output
    root /var/www/nothingcouldbebetter/frontend/build;
    index index.html;

    # SPA routing - fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static images (placeholder gradients + future FLUX images)
    location /images/ {
        alias /var/www/nothingcouldbebetter/backend/static/images/;
        expires 7d;
    }

    # API backend proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Websocket support (for future live updates)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    # Compress
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
    location ~* \.(js|css)$ {
        expires 30d;
        add_header Cache-Control "public";
    }
}
